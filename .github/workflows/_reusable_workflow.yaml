name: _Qt Build Reusable (Qt 5.15.2)

on:
  workflow_call:
    inputs:
      do_install:
        description: "Run cmake --target install (your deploy scripts)"
        type: boolean
        required: false
        default: false
      do_dmg:
        description: "Create DMG on macOS after install"
        type: boolean
        required: false
        default: false
      upload_artifacts:
        description: "Upload artifacts"
        type: boolean
        required: false
        default: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          #- os: windows-2022
          #  qt_arch: win64_msvc2019_64
          #  generator: "Visual Studio 17 2022"
          #  cmake_args: "-A x64 -T v142"
          #- os: ubuntu-22.04
          #  qt_arch: gcc_64
          #  generator: "Unix Makefiles"
          #  cmake_args: ""
          - os: macos-15-intel
            qt_arch: clang_64
            generator: "Unix Makefiles"
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    runs-on: ${{ matrix.os }}

    env:
      PROJ_DIR: ${{ github.workspace }}/build
      INSTALL_DIR: ${{ github.workspace }}/Instaled
      PACKAGE_DIR: ${{ github.workspace }}/Packaged
      APP_NAME: X-CSL-Updater

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Export QT_PATH
        shell: bash
        run: |
          echo "QT_PATH=${QT_ROOT_DIR}" >> "$GITHUB_ENV"
          echo "${QT_ROOT_DIR}/bin" >> "$GITHUB_PATH"

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B "${PROJ_DIR}" \
            -G "${{ matrix.generator }}" \
            ${{ matrix.cmake_args }} \
            -DCMAKE_PREFIX_PATH="${QT_PATH}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${INSTALL_DIR}"

      - name: Build
        shell: bash
        run: |
          cmake --build "${PROJ_DIR}" --config Release --clean-first

      - name: Install cqtdeployer (Linux only)
        if: runner.os == 'Linux' && inputs.do_install
        shell: bash
        run: |
          sudo snap install cqtdeployer
          
      - name: Install
        if: inputs.do_install
        shell: bash
        run: |
          mkdir -p "${PACKAGE_DIR}"
          cmake --build "${PROJ_DIR}" --config Release --target install

      - name: Create DMG (macOS Only)
        if: runner.os == 'macOS' && inputs.do_install && inputs.do_dmg
        shell: bash
        run: |
          brew install create-dmg
          mkdir -p dist
          APP_DIR="${INSTALL_DIR}/${APP_NAME}"
          DMG_OUT="${PACKAGE_DIR}/${APP_NAME}.dmg"
          create-dmg \
            --volname "${APP_NAME}" \
            --window-size 700 450 \
            --icon-size 128 \
            --app-drop-link 510 225 \
            "${DMG_OUT}" \
            "${APP_DIR}"

      - name: Archive package (Windows)
        if: runner.os == 'Windows' && inputs.do_install
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ env.INSTALL_DIR }}\*" -DestinationPath "${PACKAGE_DIR}\package-${{ runner.os }}.zip" -Force

      - name: Archive package (Linux)
        if: runner.os == 'Linux' && inputs.do_install
        shell: bash
        run: |
          (cd "${INSTALL_DIR}" && tar -czf "${PACKAGE_DIR}/package-${{ runner.os }}.tar.gz" .)

      - name: Upload artifacts
        if: inputs.do_install && inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ runner.os }}
          path: |
            ${{ env.PACKAGE_DIR }}/**

